name: Release IPK

on:
  workflow_dispatch:
    inputs:
      vohive_version:
        description: VoHive release tag
        required: true
        default: v1.4.3
      sdk_url:
        description: OpenWrt/ImmortalWrt SDK tarball URL
        required: false
        default: https://downloads.immortalwrt.org/releases/24.10.0/targets/mediatek/filogic/immortalwrt-sdk-24.10.0-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst
      openwrt_arch:
        description: OpenWrt package architecture
        required: true
        default: aarch64_cortex-a53
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VOHIVE_VERSION: ${{ github.event.inputs.vohive_version || 'v1.4.3' }}
      SDK_URL: ${{ github.event.inputs.sdk_url || 'https://downloads.immortalwrt.org/releases/24.10.0/targets/mediatek/filogic/immortalwrt-sdk-24.10.0-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst' }}
      OPENWRT_ARCH: ${{ github.event.inputs.openwrt_arch || 'aarch64_cortex-a53' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget zstd

      - name: Download SDK
        run: |
          test -n "$SDK_URL"
          wget -O sdk.tar.xz "$SDK_URL"
          mkdir sdk
          tar -xf sdk.tar.xz -C sdk --strip-components=1

      - name: Copy packages
        run: |
          mkdir -p sdk/package/vohive
          cp -a luci-app-vohive sdk/package/vohive/
          cp -a vohive-core sdk/package/vohive/

      - name: Download VoHive core
        run: |
          asset="vohive_${VOHIVE_VERSION}_linux_arm64"
          url="https://github.com/iniwex5/vohive-release/releases/download/${VOHIVE_VERSION}/${asset}"
          curl -fL --connect-timeout 20 --retry 3 "$url" -o sdk/package/vohive/vohive-core/files/vohive
          chmod +x sdk/package/vohive/vohive-core/files/vohive
          file sdk/package/vohive/vohive-core/files/vohive

      - name: Configure SDK
        working-directory: sdk
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig

      - name: Build IPKs
        working-directory: sdk
        run: |
          make package/vohive/luci-app-vohive/compile V=s
          make package/vohive/vohive-core/compile V=s VOHIVE_VERSION="${VOHIVE_VERSION}"

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find sdk/bin/packages -name 'luci-app-vohive_*.ipk' -exec cp {} artifacts/ \;
          find sdk/bin/packages -name 'vohive-core_*.ipk' -exec cp {} artifacts/ \;
          (cd artifacts && sha256sum *.ipk > sha256sums.txt)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vohive-ipk-${{ env.VOHIVE_VERSION }}-${{ env.OPENWRT_ARCH }}
          path: artifacts/*

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
