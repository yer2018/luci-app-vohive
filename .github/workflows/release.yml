name: Release IPK

on:
  workflow_dispatch:
    inputs:
      vohive_version:
        description: VoHive release tag
        required: true
        default: v1.4.3
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VOHIVE_VERSION: ${{ github.event.inputs.vohive_version || 'v1.4.3' }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve versions
        run: |
          set -eu
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="0.0.0-dev"
          fi
          printf 'LUCI_APP_VERSION=%s\n' "$version" >> "$GITHUB_ENV"

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y file

      - name: Setup UPX
        run: |
          set -eu
          curl -fL --connect-timeout 20 --retry 3 \
            https://github.com/upx/upx/releases/download/v3.95/upx-3.95-amd64_linux.tar.xz \
            -o /tmp/upx.tar.xz
          tar -xf /tmp/upx.tar.xz -C /tmp
          printf 'UPX_BIN=%s\n' "/tmp/upx-3.95-amd64_linux/upx" >> "$GITHUB_ENV"

      - name: Prepare package roots
        run: |
          set -eu
          mkdir -p build/luci-app-vohive/control build/luci-app-vohive/data
          cp -a luci-app-vohive/root/. build/luci-app-vohive/data/
          printf '%s\n' "$LUCI_APP_VERSION" > build/luci-app-vohive/data/usr/share/vohive/plugin_version

      - name: Download VoHive cores
        run: |
          set -eu
          for arch in arm64 amd64 armv7; do
            pkg="vohive-core-$arch"
            asset="vohive_${VOHIVE_VERSION}_linux_${arch}"
            url="https://github.com/iniwex5/vohive-release/releases/download/${VOHIVE_VERSION}/${asset}"

            mkdir -p "build/$pkg/control" "build/$pkg/data/etc/vohive/bin"
            curl -fL --connect-timeout 20 --retry 3 "$url" -o "build/$pkg/data/etc/vohive/bin/vohive"
            chmod 0755 "build/$pkg/data/etc/vohive/bin/vohive"
            before_size="$(stat -c '%s' "build/$pkg/data/etc/vohive/bin/vohive")"
            "$UPX_BIN" --lzma --best "build/$pkg/data/etc/vohive/bin/vohive" || true
            chmod 0755 "build/$pkg/data/etc/vohive/bin/vohive"
            after_size="$(stat -c '%s' "build/$pkg/data/etc/vohive/bin/vohive")"
            printf 'VoHive core %s size: %s -> %s bytes\n' "$arch" "$before_size" "$after_size"
            printf '%s\n' "$VOHIVE_VERSION" > "build/$pkg/data/etc/vohive/bin/version"
            printf '%s\n' "$arch" > "build/$pkg/data/etc/vohive/bin/arch"
            file "build/$pkg/data/etc/vohive/bin/vohive"
          done

      - name: Write package metadata
        run: |
          set -eu
          cat > build/luci-app-vohive/control/control <<EOF
          Package: luci-app-vohive
          Version: ${LUCI_APP_VERSION}-1
          Architecture: all
          Maintainer: VoHive
          Section: luci
          Priority: optional
          Depends: luci-base, rpcd, rpcd-mod-file, curl, ca-bundle, jsonfilter
          Description: LuCI management page for installing, configuring, and controlling VoHive.
          EOF
          sed -i 's/^[[:space:]]*//' build/luci-app-vohive/control/control

          cat > build/luci-app-vohive/control/conffiles <<EOF
          /etc/config/vohive
          EOF

          cat > build/luci-app-vohive/control/postinst <<'EOF'
          #!/bin/sh
          [ -n "${IPKG_INSTROOT}" ] || {
          	mkdir -p /etc/vohive/config /etc/vohive/data /tmp/vohive/logs /tmp/vohive/download
          }
          exit 0
          EOF
          chmod 0755 build/luci-app-vohive/control/postinst

          write_core_metadata() {
            arch="$1"
            pkg="vohive-core-$arch"
            conflicts="vohive-core"
            for other in arm64 amd64 armv7; do
              [ "$other" = "$arch" ] || conflicts="$conflicts, vohive-core-$other"
            done

            {
              printf 'Package: %s\n' "$pkg"
              printf 'Version: %s-1\n' "$VOHIVE_VERSION"
              printf 'Architecture: all\n'
              printf 'Maintainer: VoHive\n'
              printf 'Section: utils\n'
              printf 'Priority: optional\n'
              printf 'Conflicts: %s\n' "$conflicts"
              printf 'Description: Preinstalled VoHive linux_%s core binary for luci-app-vohive.\n' "$arch"
            } > "build/$pkg/control/control"

            cat > "build/$pkg/control/postinst" <<'EOF'
          #!/bin/sh
          [ -n "${IPKG_INSTROOT}" ] || {
            if [ -x /etc/init.d/vohive ] && /etc/init.d/vohive running >/dev/null 2>&1; then
              /etc/init.d/vohive restart || true
            fi
          }
          exit 0
          EOF
            chmod 0755 "build/$pkg/control/postinst"
          }

          for arch in arm64 amd64 armv7; do
            write_core_metadata "$arch"
          done

      - name: Build IPKs
        run: |
          set -eu
          mkdir -p artifacts
          build_ipk() {
            pkg="$1"
            version="$2"
            arch="$3"
            work="build/$pkg"
            out="artifacts/${pkg}_${version}_${arch}.ipk"

            printf '2.0\n' > "$work/debian-binary"
            tar --numeric-owner --owner=0 --group=0 -czf "$work/control.tar.gz" -C "$work/control" .
            tar --numeric-owner --owner=0 --group=0 -czf "$work/data.tar.gz" -C "$work/data" .
            tar --numeric-owner --owner=0 --group=0 -czf "$out" -C "$work" ./debian-binary ./data.tar.gz ./control.tar.gz
          }

          build_ipk luci-app-vohive "${LUCI_APP_VERSION}-1" all
          for arch in arm64 amd64 armv7; do
            build_ipk "vohive-core-$arch" "${VOHIVE_VERSION}-1" all
          done
          for ipk in artifacts/*.ipk; do
            file "$ipk"
            tar -tzf "$ipk" | sed -n '1,3p'
          done
          (cd artifacts && sha256sum *.ipk > sha256sums.txt)

      - name: Write release notes
        run: |
          set -eu
          cat > build/release-notes.md <<EOF
          ## VoHive LuCI ${LUCI_APP_VERSION}

          ### 安装包说明

          - \`luci-app-vohive_${LUCI_APP_VERSION}-1_all.ipk\`: LuCI 管理页面，不包含 VoHive core。安装后可在页面下载/安装核心。
          - \`vohive-core-arm64_${VOHIVE_VERSION}-1_all.ipk\`: 仅包含 \`vohive_${VOHIVE_VERSION}_linux_arm64\` core。
          - \`vohive-core-amd64_${VOHIVE_VERSION}-1_all.ipk\`: 仅包含 \`vohive_${VOHIVE_VERSION}_linux_amd64\` core。
          - \`vohive-core-armv7_${VOHIVE_VERSION}-1_all.ipk\`: 仅包含 \`vohive_${VOHIVE_VERSION}_linux_armv7\` core。

          \`vohive-core-*\` 包会在构建时尝试使用 UPX \`--lzma --best\` 压缩 core 二进制；如果 UPX 不支持该二进制，会自动保留原始 core。

          ### 架构选择

          - \`aarch64\` / \`arm64\` 路由器选择 \`arm64\`
          - \`x86_64\` / \`amd64\` 设备选择 \`amd64\`
          - \`armv7l\` / \`armv7\` 设备选择 \`armv7\`

          ### 安装示例

          只安装 LuCI 管理页面：

          \`\`\`sh
          opkg install luci-app-vohive_${LUCI_APP_VERSION}-1_all.ipk
          \`\`\`

          一步到位安装 LuCI + core，按设备架构选择一个 core 包：

          \`\`\`sh
          opkg install luci-app-vohive_${LUCI_APP_VERSION}-1_all.ipk vohive-core-arm64_${VOHIVE_VERSION}-1_all.ipk
          opkg install luci-app-vohive_${LUCI_APP_VERSION}-1_all.ipk vohive-core-amd64_${VOHIVE_VERSION}-1_all.ipk
          opkg install luci-app-vohive_${LUCI_APP_VERSION}-1_all.ipk vohive-core-armv7_${VOHIVE_VERSION}-1_all.ipk
          \`\`\`

          已安装 LuCI 后，只安装/替换 core：

          \`\`\`sh
          opkg install vohive-core-arm64_${VOHIVE_VERSION}-1_all.ipk
          \`\`\`
          EOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vohive-ipk-${{ env.VOHIVE_VERSION }}
          path: artifacts/*

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: build/release-notes.md
          files: artifacts/*
