name: Release IPK

on:
  workflow_dispatch:
    inputs:
      vohive_version:
        description: VoHive release tag
        required: true
        default: v1.4.3
      openwrt_arch:
        description: OpenWrt package architecture
        required: true
        default: aarch64_cortex-a53
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VOHIVE_VERSION: ${{ github.event.inputs.vohive_version || 'v1.4.3' }}
      OPENWRT_ARCH: ${{ github.event.inputs.openwrt_arch || 'aarch64_cortex-a53' }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve versions
        run: |
          set -eu
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="0.0.0-dev"
          fi
          printf 'LUCI_APP_VERSION=%s\n' "$version" >> "$GITHUB_ENV"

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y file

      - name: Prepare package roots
        run: |
          set -eu
          mkdir -p build/luci-app-vohive/control build/luci-app-vohive/data
          mkdir -p build/vohive-core/control build/vohive-core/data
          cp -a luci-app-vohive/root/. build/luci-app-vohive/data/
          printf '%s\n' "$LUCI_APP_VERSION" > build/luci-app-vohive/data/usr/share/vohive/plugin_version
          mkdir -p build/vohive-core/data/etc/vohive/bin

      - name: Download VoHive core
        run: |
          set -eu
          asset="vohive_${VOHIVE_VERSION}_linux_arm64"
          url="https://github.com/iniwex5/vohive-release/releases/download/${VOHIVE_VERSION}/${asset}"
          curl -fL --connect-timeout 20 --retry 3 "$url" -o build/vohive-core/data/etc/vohive/bin/vohive
          chmod 0755 build/vohive-core/data/etc/vohive/bin/vohive
          printf '%s\n' "$VOHIVE_VERSION" > build/vohive-core/data/etc/vohive/bin/version
          file build/vohive-core/data/etc/vohive/bin/vohive

      - name: Write package metadata
        run: |
          set -eu
          cat > build/luci-app-vohive/control/control <<EOF
          Package: luci-app-vohive
          Version: ${LUCI_APP_VERSION}-1
          Architecture: all
          Maintainer: VoHive
          Section: luci
          Priority: optional
          Depends: luci-base, rpcd, rpcd-mod-file, curl, ca-bundle, jsonfilter
          Description: LuCI management page for installing, configuring, and controlling VoHive.
          EOF
          sed -i 's/^[[:space:]]*//' build/luci-app-vohive/control/control

          cat > build/luci-app-vohive/control/conffiles <<EOF
          /etc/config/vohive
          EOF

          cat > build/luci-app-vohive/control/postinst <<'EOF'
          #!/bin/sh
          [ -n "${IPKG_INSTROOT}" ] || {
          	mkdir -p /etc/vohive/config /etc/vohive/data /tmp/vohive/logs /tmp/vohive/download
          }
          exit 0
          EOF
          chmod 0755 build/luci-app-vohive/control/postinst

          cat > build/vohive-core/control/control <<EOF
          Package: vohive-core
          Version: ${VOHIVE_VERSION}-1
          Architecture: ${OPENWRT_ARCH}
          Maintainer: VoHive
          Section: utils
          Priority: optional
          Description: Preinstalled VoHive core binary for luci-app-vohive.
          EOF
          sed -i 's/^[[:space:]]*//' build/vohive-core/control/control

          cat > build/vohive-core/control/postinst <<'EOF'
          #!/bin/sh
          [ -n "${IPKG_INSTROOT}" ] || {
          	if [ -x /etc/init.d/vohive ] && /etc/init.d/vohive running >/dev/null 2>&1; then
          		/etc/init.d/vohive restart || true
          	fi
          }
          exit 0
          EOF
          chmod 0755 build/vohive-core/control/postinst

      - name: Build IPKs
        run: |
          set -eu
          mkdir -p artifacts
          build_ipk() {
            pkg="$1"
            version="$2"
            arch="$3"
            work="build/$pkg"
            out="artifacts/${pkg}_${version}_${arch}.ipk"

            printf '2.0\n' > "$work/debian-binary"
            tar --numeric-owner --owner=0 --group=0 -czf "$work/control.tar.gz" -C "$work/control" .
            tar --numeric-owner --owner=0 --group=0 -czf "$work/data.tar.gz" -C "$work/data" .
            tar --numeric-owner --owner=0 --group=0 -czf "$out" -C "$work" ./debian-binary ./data.tar.gz ./control.tar.gz
          }

          build_ipk luci-app-vohive "${LUCI_APP_VERSION}-1" all
          build_ipk vohive-core "${VOHIVE_VERSION}-1" "${OPENWRT_ARCH}"
          for ipk in artifacts/*.ipk; do
            file "$ipk"
            tar -tzf "$ipk" | sed -n '1,3p'
          done
          (cd artifacts && sha256sum *.ipk > sha256sums.txt)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vohive-ipk-${{ env.VOHIVE_VERSION }}-${{ env.OPENWRT_ARCH }}
          path: artifacts/*

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
