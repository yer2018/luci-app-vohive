name: Release Packages

on:
  workflow_dispatch:
    inputs:
      vohive_version:
        description: VoHive release tag
        required: true
        default: v1.5.5
  push:
    tags:
      - 'v*'

env:
  TZ: Asia/Shanghai
  VOHIVE_VERSION: ${{ github.event.inputs.vohive_version || 'v1.5.5' }}

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.release_meta.outputs.tag_name }}
      luci_version: ${{ steps.release_meta.outputs.luci_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve versions
        id: release_meta
        run: |
          set -eu
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            tag_name="${GITHUB_REF_NAME}"
            luci_version="${GITHUB_REF_NAME#v}"
          else
            tag_name="v0.0.0-dev"
            luci_version="0.0.0-dev"
          fi

          previous_tag="$(git tag --sort=-v:refname --merged HEAD | grep -v "^${tag_name}$" | head -n 1 || true)"

          {
            echo "## VoHive LuCI ${luci_version}"
            echo
            echo "### 更新日志"
            echo
            if [ -n "$previous_tag" ]; then
              git log --pretty=format:'- %s (%h)' "${previous_tag}..HEAD"
            else
              git log --pretty=format:'- %s (%h)' -n 20
            fi
            echo
            echo
            echo "### 安装包说明"
            echo
            echo "- luci-app-vohive: LuCI 管理页面，不包含 VoHive core。安装后可在页面下载/安装核心。"
            echo "- vohive-core-arm64: 仅包含 vohive_${VOHIVE_VERSION}_linux_arm64 core。"
            echo "- vohive-core-amd64: 仅包含 vohive_${VOHIVE_VERSION}_linux_amd64 core。"
            echo "- vohive-core-armv7: 仅包含 vohive_${VOHIVE_VERSION}_linux_armv7 core。"
            echo
            echo "### 包格式"
            echo
            echo "- OpenWrt 24.10 SDK: .ipk"
            echo "- OpenWrt 25.12 SDK: .apk"
            echo
            echo "### 架构选择"
            echo
            echo "- aarch64 / arm64 路由器选择 arm64"
            echo "- x86_64 / amd64 设备选择 amd64"
            echo "- armv7l / armv7 设备选择 armv7"
            echo
            if [ -n "$previous_tag" ]; then
              echo "完整对比: https://github.com/${GITHUB_REPOSITORY}/compare/${previous_tag}...${tag_name}"
            fi
          } > release-notes.md

          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "luci_version=${luci_version}" >> "$GITHUB_OUTPUT"

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md

  build:
    name: Build ${{ matrix.label }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: openwrt_24_ipk
            label: OpenWrt 24.10 IPK
          - id: openwrt_25_apk
            label: OpenWrt 25.12 APK

    steps:
      - name: Install packages
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install zstd build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3 rsync unzip zlib1g-dev file wget curl
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: source

      - name: Import SDK environment
        id: sdk_env
        run: |
          cat "source/.github/workflows/${{ matrix.id }}.env" >> "$GITHUB_ENV"
          while IFS='=' read -r key value; do
            echo "${key,,}=${value}" >> "$GITHUB_OUTPUT"
          done < "source/.github/workflows/${{ matrix.id }}.env"

      - name: Prepare VoHive core files
        run: |
          set -eu
          mkdir -p source/vohive-core/files
          for arch in arm64 amd64 armv7; do
            asset="vohive_${VOHIVE_VERSION}_linux_${arch}"
            url="https://raw.githubusercontent.com/yer2018/luci-app-vohive/refs/heads/main/vohive-core/files/vohive_v1.5.5-10-gf9eb85d_linux_${arch}"
            curl -fL --connect-timeout 20 --retry 3 "$url" -o "source/vohive-core/files/vohive-${arch}"
            chmod 0755 "source/vohive-core/files/vohive-${arch}"
            file "source/vohive-core/files/vohive-${arch}"
          done

      - name: Initialize SDK
        env:
          SDK_FILE: ${{ steps.sdk_env.outputs.sdk_name }}.${{ steps.sdk_env.outputs.sdk_ext }}
          SDK_SOURCE: ${{ steps.sdk_env.outputs.sdk_url }}${{ steps.sdk_env.outputs.sdk_name }}.${{ steps.sdk_env.outputs.sdk_ext }}
        run: |
          set -eu
          wget "$SDK_SOURCE"
          mkdir -p sdk
          if [ "${SDK_EXT}" = "tar.zst" ]; then
            tar --zstd -xf "$SDK_FILE" -C sdk --strip-components=1
          else
            tar -xf "$SDK_FILE" -C sdk --strip-components=1
          fi

          cd sdk
          cat <<EOF > feeds.conf
          src-git base https://github.com/openwrt/openwrt.git;${FEED_BRANCH}
          src-git packages https://github.com/openwrt/packages.git;${FEED_BRANCH}
          src-git luci https://github.com/openwrt/luci.git;${FEED_BRANCH}
          src-git routing https://git.openwrt.org/feed/routing.git;${FEED_BRANCH}
          src-link vohive $(pwd)/../source
          EOF
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          ./scripts/feeds install -a -p vohive

          cat <<'EOF' > .config
          CONFIG_ALL_NONSHARED=n
          CONFIG_ALL_KMODS=n
          CONFIG_ALL=n
          CONFIG_AUTOREMOVE=n
          CONFIG_PACKAGE_luci-app-vohive=m
          CONFIG_PACKAGE_vohive-core-arm64=m
          CONFIG_PACKAGE_vohive-core-amd64=m
          CONFIG_PACKAGE_vohive-core-armv7=m
          EOF
          make defconfig
          make clean

      - name: Compile packages
        run: |
          set -eu
          cd sdk
          ./scripts/feeds update vohive
          ./scripts/feeds install -a -p vohive

          for pkg in luci-app-vohive vohive-core; do
            make "package/feeds/vohive/${pkg}/clean" || true
            if ! make "package/feeds/vohive/${pkg}/compile" -j"$(nproc)"; then
              make "package/feeds/vohive/${pkg}/compile" -j1 V=s
            fi
          done

          package_dir="$(pwd)/bin/packages/${SDK_ARCH}/vohive"
          dist_dir="$(pwd)/../dist/${{ matrix.id }}"
          mkdir -p "$dist_dir"

          shopt -s nullglob
          package_files=("$package_dir"/*.${PACKAGE_EXT})
          if [ ${#package_files[@]} -eq 0 ]; then
            echo "No .${PACKAGE_EXT} packages were produced in ${package_dir}" >&2
            exit 1
          fi

          cp "$package_dir"/*.${PACKAGE_EXT} "$dist_dir"/
          cp "$package_dir"/Packages* "$dist_dir"/ 2>/dev/null || true
          cp "$package_dir"/APKINDEX* "$dist_dir"/ 2>/dev/null || true

          {
            echo "Tag: ${{ needs.prepare.outputs.tag_name }}"
            echo "LuCI version: ${{ needs.prepare.outputs.luci_version }}"
            echo "VoHive core: ${VOHIVE_VERSION}"
            echo "Build: ${{ matrix.label }}"
            echo "Build ID: ${{ matrix.id }}"
            echo "SDK: ${SDK_NAME}"
            echo "Package format: ${PACKAGE_EXT}"
            echo "Package count: ${#package_files[@]}"
          } > "$dist_dir/BUILD-INFO.txt"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vohive-${{ matrix.id }}
          path: dist/${{ matrix.id }}
          retention-days: 7

  release:
    name: Publish Release
    needs:
      - prepare
      - build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: vohive-*
          merge-multiple: false

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: release-notes

      - name: Collect release assets
        run: |
          set -eu
          mkdir -p releases
          shopt -s nullglob

          for dir in artifacts/*; do
            [ -d "$dir" ] || continue
            for package in "$dir"/*.ipk "$dir"/*.apk; do
              [ -f "$package" ] || continue
              cp "$package" releases/
            done
            [ -f "$dir/BUILD-INFO.txt" ] && cp "$dir/BUILD-INFO.txt" "releases/$(basename "$dir")-BUILD-INFO.txt"
          done

          (cd releases && sha256sum *.ipk *.apk 2>/dev/null > sha256sums.txt || true)
          ls -lh releases

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          body_path: release-notes/release-notes.md
          files: releases/*
